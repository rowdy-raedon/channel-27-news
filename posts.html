<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All Posts — Channel 27 News &amp; Entertainment</title>
  <meta name="description" content="Browse the latest updates, videos, photos, and live streams from Channel 27 News & Entertainment on Facebook.">

  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0a0712">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="posts">
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main">
    <!-- PAGE HERO -->
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Facebook feed</span>
        <h1>All <span class="text-gold">Posts</span></h1>
        <div class="rule"></div>
        <p>Browse the latest updates from Channel 27 News &amp; Entertainment. Everything below comes straight from our Facebook page.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="posts-layout">
          <!-- FILTERS -->
          <aside class="posts-sidebar" data-filterbar aria-label="Filter posts">
            <div class="side-title">Filter</div>
            <button class="filter-btn active" type="button" data-filter="all" aria-selected="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
              <span>All Posts</span>
            </button>
            <button class="filter-btn" type="button" data-filter="video" aria-selected="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="5" width="14" height="14" rx="2.5"/><path d="m16 9 6-3v12l-6-3"/></svg>
              <span>Videos</span>
            </button>
            <button class="filter-btn" type="button" data-filter="photo" aria-selected="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2.5"/><circle cx="8.5" cy="10" r="1.6"/><path d="m21 17-5-5L5 19"/></svg>
              <span>Photos</span>
            </button>
            <button class="filter-btn" type="button" data-filter="live" aria-selected="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M6.3 6.3a8 8 0 0 0 0 11.4M17.7 6.3a8 8 0 0 1 0 11.4M3.5 3.5a12 12 0 0 0 0 17M20.5 3.5a12 12 0 0 1 0 17"/></svg>
              <span>Live Videos</span>
            </button>
          </aside>

          <!-- FEED -->
          <div class="posts-main">
            <div class="posts-main-head">
              <h2 style="font-size:20px;font-weight:800">Latest from <span class="text-gold">Channel 27</span></h2>
            </div>

            <div id="all-feed" class="feed-grid cols-3" aria-live="polite"></div>

            <div class="feed-more" data-loadmore hidden>
              <button class="btn btn-gold-outline btn-lg" type="button">
                Load More Posts
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
