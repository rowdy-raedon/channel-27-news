<!DOCTYPE html>

<head>

  <link rel="icon" href="assets/favicon.ico" sizes="any">

<body data-page="post">

    <section class="section">

        <a class="back-link" href="posts.html">

          Back to All Posts
        </a>

        <div class="single-layout">
          <!-- MAIN POST -->
          <article class="single-main" id="single-embed" aria-live="polite">
            <!-- Facebook embed is injected here by main.js -->
          </article>

          <!-- SIDEBAR -->
          <aside class="single-sidebar">
            <div class="sidebar-card follow">
              <h3>Follow Channel 27</h3>
              <p>Get every post, video, and live stream the moment it goes up.</p>
              <a class="btn btn-fb" data-fb-link href="#" target="_blank" rel="noopener">

            <div class="sidebar-card">
              <h3>Watch Live</h3>

              <a class="btn btn-gold-outline watch-live" data-watch-live href="#" target="_blank" rel="noopener" style="width:100%">

        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      var c = C27_CONFIG;
      document.querySelectorAll("[data-fb-link]").forEach(function (a) { a.href = c.facebook.fanPageUrl; });
      document.querySelectorAll("[data-watch-live]").forEach(function (a) { a.href = c.facebook.watchLiveUrl; });
